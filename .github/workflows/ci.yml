name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  financial-data-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: stock_market
          POSTGRES_USER: stock_user
          POSTGRES_PASSWORD: stock_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stock_user -d stock_market"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://stock_user:stock_password@localhost:5432/stock_market
      REDIS_URL: redis://localhost:6379/0
      GROQ_API_KEY: test-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run mocked financial data tests
        run: pytest tests -q
